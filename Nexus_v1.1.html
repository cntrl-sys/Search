<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NexusSearch</title>
<!-- Favicon -->
<link rel="icon" href="https://cdn-icons-png.flaticon.com/256/4332/4332953.png" type="image/png">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script async src="https://cse.google.com/cse.js?cx=37cfcbf41b7bc439c"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:#06060a;color:#f0f0f5;min-height:100vh;}
header{display:flex;justify-content:space-between;align-items:center;padding:20px 40px;border-bottom:1px solid rgba(255,255,255,0.07);background:rgba(6,6,10,.8);}
.logo{font-family:'Syne',sans-serif;font-size:24px;font-weight:800;background:linear-gradient(135deg,#7c6af7,#e06bf0);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.hero{text-align:center;padding:80px 20px 40px;}
.hero h1{font-family:'Syne';font-size:60px;margin-bottom:20px;}
.hero em{background:linear-gradient(135deg,#7c6af7,#e06bf0);-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-style:normal;}
.hero p{color:#888;margin-bottom:30px;}
.tabs{display:flex;justify-content:center;gap:10px;margin-bottom:20px;}
.tab{background:#16161f;border:1px solid rgba(255,255,255,0.07);color:#aaa;padding:10px 20px;border-radius:10px;cursor:pointer;}
.tab.active{background:rgba(124,106,247,.2);color:#c4baff;}
.search-box{max-width:700px;margin:auto;}
.gcse-search{background:#16161f;padding:20px;border-radius:14px;border:1px solid rgba(255,255,255,0.07);}
.gsc-control-cse{background:transparent !important;border:none !important;}
.gsc-result{background:#16161f !important;border-radius:10px !important;border:1px solid rgba(255,255,255,0.07) !important;padding:12px !important;margin-bottom:10px !important;}
.gs-title{color:#c4baff !important;font-family:'Syne' !important;}
.gs-snippet{color:#aaa !important;}
.gsc-imageResult{border-radius:10px !important;overflow:hidden !important;}
footer{text-align:center;padding:20px;color:#777;border-top:1px solid rgba(255,255,255,0.07);margin-top:40px;}
#preview-container{margin-top:20px;display:none;}
#preview-frame{width:100%;height:600px;border:1px solid #888;border-radius:10px;}
</style>
</head>
<body>
<header>
<div class="logo">NexusSearch</div>
</header>
<section class="hero">
<h1>Finde alles.<br><em>Sofort.</em></h1>
<p>Die intelligente Suchmaschine für Web und Bilder</p>
<div class="tabs">
<button class="tab active" onclick="setMode('web')">🌐 Web</button>
<button class="tab" onclick="setMode('image')">🖼️ Bilder</button>
</div>
<div class="search-box">
<div id="search-area">
<div class="gcse-search"
     data-enableImageSearch="true"
     data-defaultToImageSearch="false"
     data-imageSearchLayout="grid">
</div>
</div>
<div id="preview-container">
<iframe id="preview-frame"></iframe>
</div>
</div>
</section>
<footer>
© 2026 NexusSearch
</footer>
<script>
let mode="web";

function setMode(newMode){
mode=newMode;
document.querySelectorAll(".tab").forEach(tab=>tab.classList.remove("active"));
if(mode==="web") document.querySelectorAll(".tab")[0].classList.add("active");
else document.querySelectorAll(".tab")[1].classList.add("active");
reloadSearch();
}

function reloadSearch(){
const area=document.getElementById("search-area");
area.innerHTML="";
const div=document.createElement("div");
div.className="gcse-search";
div.setAttribute("data-enableImageSearch","true");
div.setAttribute("data-defaultToImageSearch",mode==="image"?"true":"false");
div.setAttribute("data-imageSearchLayout","grid");
area.appendChild(div);
if(window.google && google.search && google.search.cse){
google.search.cse.element.render(div);
}
}

// Klick auf Ergebnis abfangen und in iframe öffnen
document.addEventListener('click', function(e){
  const resultLink = e.target.closest('.gs-title a');
  if(resultLink){
    e.preventDefault();
    const url = resultLink.href;
    const iframe = document.getElementById('preview-frame');
    iframe.src = url;
    document.getElementById('preview-container').style.display = 'block';
  }
});
</script>
</body>
</html>
